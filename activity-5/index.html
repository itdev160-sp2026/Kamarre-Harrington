<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Activity 5: Simple Math Operations Widget</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Activity 5: Simple Math Operations Widget</h1>

    <div class="math-widget">
        <label for="number1">First Number:</label>
        <input type="text" id="number1" placeholder="Enter first number">

        <label for="number2">Second Number:</label>
        <input type="text" id="number2" placeholder="Enter second number">

        <div class="buttons">
            <button data-operation="add">Add</button>
            <button data-operation="subtract">Subtract</button>
            <button data-operation="multiply">Multiply</button>
            <button data-operation="divide">Divide</button>
        </div>

        <div id="result">Result will appear here</div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
