<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity 10: Tic-Tac-Toe with localStorage</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>Activity 10: Tic-Tac-Toe</h1>
  <p>Open the console (F12) to see localStorage demonstrations and debugging output.</p>

  <div class="game-container">

    <div id="status" class="status">Current Player: X</div>

    <div class="board" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <button id="newGameBtn">New Game</button>

  </div>

  <script src="scripts.js"></script>
</body>
</html>
