<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activity 7: Product Catalog Display</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Activity 7: Product Catalog</h1>
    <p>Open the browser console to view the array and object demonstrations.</p>
  </header>

  <main>
    <div class="catalog-container">
      <section class="controls">
        <div class="search-box">
          <label for="searchInput">Search Products:</label>
          <input
            type="text"
            id="searchInput"
            placeholder="Search by name or description"
          />
        </div>

        <div class="filter-box">
          <label for="categoryFilter">Filter by Category:</label>
          <select id="categoryFilter">
            <option value="all">All Categories</option>
            <option value="electronics">Electronics</option>
            <option value="clothing">Clothing</option>
            <option value="books">Books</option>
          </select>
        </div>

        <button id="clearFiltersBtn">Clear Filters</button>
      </section>

      <div class="results-info">
        <p id="resultsCount">Showing 0 products</p>
      </div>

      <div id="product-grid"></div>
    </div>
  </main>

  <script src="demos.js"></script>
  <script src="scripts.js"></script>
</body>
</html>
